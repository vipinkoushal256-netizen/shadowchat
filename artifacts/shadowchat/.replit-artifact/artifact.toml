kind = "web"
previewPath = "/"
title = "ShadowChat"
version = "1.0.0"
id = "artifacts/shadowchat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25617

[services.development]
run = "pnpm --filter @workspace/shadowchat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shadowchat", "run", "build" ]
publicDir = "artifacts/shadowchat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25617"
BASE_PATH = "/"
